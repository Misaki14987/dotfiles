"$schema" = "https://starship.rs/config-schema.json"

# macOS-Terminal-inspired prompt: quiet, one line, lowercase, no pills
add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$python$nodejs$rust$golang$java\
$cmd_duration\
$line_break\
$character"""

right_format = "$time"

[directory]
style = "bold"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " "
read_only_style = "red"

[directory.substitutions]
"Documents" = "Documents"
"Downloads" = "Downloads"
"Music"     = "Music"
"Pictures"  = "Pictures"
"Developer" = "dev"
"dev"       = "dev"

[character]
success_symbol = "[›](bold green)"
error_symbol   = "[›](bold red)"
vimcmd_symbol  = "[‹](bold green)"

[git_branch]
symbol = " "
style  = "italic dimmed"
format = "[on $symbol$branch]($style) "

[git_status]
style = "dimmed yellow"
format = "[$all_status$ahead_behind]($style) "
conflicted = "="
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked  = "?"
stashed    = "$"
modified   = "!"
staged     = "+"
renamed    = "»"
deleted    = "✘"

[cmd_duration]
min_time = 2000
format = "[took $duration]($style) "
style  = "dimmed"

[time]
disabled = false
time_format = "%H:%M"
format = "[$time]($style)"
style  = "dimmed"

[python]
symbol = " "
format = "[$symbol$version]($style) "
style  = "dimmed yellow"
[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style  = "dimmed green"
[rust]
symbol = " "
format = "[$symbol$version]($style) "
style  = "dimmed red"
[golang]
symbol = " "
format = "[$symbol$version]($style) "
style  = "dimmed cyan"
[java]
symbol = " "
format = "[$symbol$version]($style) "
style  = "dimmed red"

[os]
disabled = true
[username]
disabled = true
[hostname]
disabled = true
