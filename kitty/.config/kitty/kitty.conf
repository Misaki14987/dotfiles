font_family       SF Mono
font_family       JetBrainsMono Nerd Font
bold_font         auto
italic_font       auto
font_size         13.0
disable_ligatures never
modify_font cell_height 110%

shell             fish
cursor_shape      beam
cursor_blink_interval 0.5
scrollback_lines  10000
enable_audio_bell no

window_padding_width 14 16
window_margin_width  0
single_window_margin_width 0
hide_window_decorations  yes
confirm_os_window_close  0

background_opacity 0.78
background_blur    32
dynamic_background_opacity yes

tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   round
tab_title_template    "{index}: {title[:24]}"

foreground            #E5E5E7
background            #1C1C1E
selection_foreground  #1C1C1E
selection_background  #FFD479

cursor                #E5E5E7
cursor_text_color     background
url_color             #5AC8FA

color0  #2A2A2C
color8  #6E6E73
color1  #FF453A
color9  #FF6961
color2  #30D158
color10 #5DDB6E
color3  #FFD60A
color11 #FFE066
color4  #0A84FF
color12 #5AC8FA
color5  #BF5AF2
color13 #DA8FFF
color6  #64D2FF
color14 #99E0FF
color7  #E5E5E7
color15 #FFFFFF

# ===== Keybindings =====
kitty_mod ctrl+shift
enabled_layouts splits,stack

# 新建 / 关闭
map kitty_mod+o      launch --location=vsplit --cwd=current
map kitty_mod+shift+o launch --location=hsplit --cwd=current
map kitty_mod+t       new_tab_with_cwd
map kitty_mod+w       close_window
map kitty_mod+shift+w close_tab

# 标签页切换
map kitty_mod+[       previous_tab
map kitty_mod+]       next_tab

# vim 风格切窗
map kitty_mod+h       neighboring_window left
map kitty_mod+j       neighboring_window down
map kitty_mod+k       neighboring_window up
map kitty_mod+l       neighboring_window right

# 调整窗口大小
map kitty_mod+alt+h   resize_window narrower
map kitty_mod+alt+l   resize_window wider
map kitty_mod+alt+j   resize_window shorter
map kitty_mod+alt+k   resize_window taller
map kitty_mod+0       resize_window reset

# 切换布局
map kitty_mod+n   next_layout
